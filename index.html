<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Air Camera</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

<style>
  body { margin:0; overflow:hidden; }
  video, canvas {
    position:absolute;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let prevX = 0, prevY = 0;

// Start Camera manually (more stable)
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera permission denied or error: " + err);
});

// Finger detection
function fingersUp(lm) {
  return [
    lm[4].x < lm[3].x,
    lm[8].y < lm[6].y,
    lm[12].y < lm[10].y
  ];
}

const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) {
      let [thumb, index, middle] = fingersUp(lm);
      let x = lm[8].x * canvas.width;
      let y = lm[8].y * canvas.height;

      // Clear
      if (thumb && !index && !middle) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      // Draw
      else if (!thumb && index && !middle) {
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = "blue";
        ctx.lineWidth = 5;
        ctx.stroke();
        prevX = x;
        prevY = y;
      }
      // Erase
      else if (!thumb && index && middle) {
        ctx.clearRect(x - 25, y - 25, 50, 50);
      }
    }
  }
});

// Process frames
async function detect() {
  await hands.send({image: video});
  requestAnimationFrame(detect);
}

video.addEventListener("loadeddata", () => {
  detect();
});
</script>

</body>
</html>
